services:
  fesstest01:
    image: ghcr.io/codelibs/fess:snapshot-noble
    container_name: fesstest01
    environment:
      - "SEARCH_ENGINE_HTTP_URL=http://searchtest01:9200"
      - "FESS_DICTIONARY_PATH=${FESS_DICTIONARY_PATH:-/usr/share/elasticsearch/config/dictionary/}"
      # Cap the Fess heap (default -Xmx2g) so Fess + OpenSearch (1g) + the
      # Playwright/Chromium runner fit the ~7GB GitHub runner with headroom.
      # Without this the JVM races the kernel OOM-killer and the container can
      # exit mid-suite (admin POSTs are write/GC-heavy), tearing down the run.
      - "FESS_HEAP_SIZE=1g"
      # Turn heap exhaustion into a clean, logged exit instead of GC thrash.
      - "FESS_JAVA_OPTS=-XX:+ExitOnOutOfMemoryError"
#    ports:
#      - "8080:8080"
    # Container ceiling so an OOM is contained and reported as OOMKilled
    # (visible via `docker inspect`) instead of silently starving neighbors.
    mem_limit: 2g
    networks:
      - searchtestnet
    depends_on:
      - searchtest01